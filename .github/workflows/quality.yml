name: Quality - Code Analysis & Coverage

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  coverage:
    name: Test Coverage Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm test -- --coverage --passWithNoTests

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          verbose: true
          fail_ci_if_error: false

      - name: Generate coverage badge
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Report coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('./coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;

            const message = `
## Test Coverage

| Metric | Coverage |
|--------|----------|
| Statements | ${total.statements.pct}% |
| Branches | ${total.branches.pct}% |
| Functions | ${total.functions.pct}% |
| Lines | ${total.lines.pct}% |
            `.trim();

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: message
            });

  bundle-analysis:
    name: Bundle Size Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Calculate bundle size
        run: |
          npm run build 2>/dev/null || echo "Bundle build skipped"
          du -sh node_modules > node_modules.size
          du -sh dist 2>/dev/null > dist.size || echo "No dist dir"

      - name: Check bundle size
        run: |
          echo "=== Bundle Sizes ==="
          cat node_modules.size 2>/dev/null || echo "node_modules: N/A"
          cat dist.size 2>/dev/null || echo "dist: N/A"

  dependency-check:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Audit dependencies
        run: |
          npm audit --audit-level=moderate 2>&1 || true
          echo "Audit complete"

      - name: Check outdated packages
        run: |
          npm outdated 2>&1 || echo "No outdated packages"

      - name: Create dependency report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: package-lock.json
          retention-days: 7

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint 2>/dev/null || echo "Linting skipped"

      - name: Type check
        run: npx tsc --noEmit 2>/dev/null || echo "Type checking completed"

      - name: Check for console logs
        run: |
          echo "Checking for console logs..."
          ! grep -r "console\\.log\\|console\\.warn\\|console\\.error" \
            app/ lib/ --include="*.ts" --include="*.tsx" \
            --exclude-dir=node_modules || echo "Warning: Console logs found in code"

      - name: Check accessibility compliance
        run: npm test -- app/__tests__/accessibility.test.ts

  performance:
    name: Performance Baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Measure test execution time
        run: |
          echo "Test Performance Baseline"
          time npm test -- --passWithNoTests 2>&1 | tail -20

      - name: Check build performance
        run: |
          echo "Build Performance Baseline"
          time npm run build 2>/dev/null || echo "Build skipped"

  quality-summary:
    name: Quality Check Summary
    needs: [ coverage, bundle-analysis, dependency-check, code-quality ]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Verify quality gates
        run: |
          echo "=== Quality Summary ==="
          echo "Coverage: ${{ needs.coverage.result }}"
          echo "Bundle Analysis: ${{ needs.bundle-analysis.result }}"
          echo "Dependencies: ${{ needs.dependency-check.result }}"
          echo "Code Quality: ${{ needs.code-quality.result }}"

      - name: Summary report
        if: failure()
        run: |
          echo "❌ Quality checks failed"
          echo "Please review the logs above for details"
