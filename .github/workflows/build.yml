name: Build - APK & Artifacts

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 30

      - name: Install dependencies
        run: npm ci

      - name: Build APK (debug)
        if: github.event.inputs.build_type == 'debug' || github.ref == 'refs/heads/develop'
        working-directory: android
        run: ./gradlew assembleDebug -x lintDebug

      - name: Build APK (release)
        if: github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        working-directory: android
        run: ./gradlew assembleRelease -x lintRelease || echo "Signing not configured in CI"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: ignore

  build-web:
    name: Build Web Bundle
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle (if applicable)
        run: npm run build 2>/dev/null || echo "Web build not configured"

      - name: Upload web artifacts
        uses: actions/upload-artifact@v4
        if: hashFiles('dist/**') != ''
        with:
          name: web-bundle
          path: dist/
          retention-days: 30

  create-release:
    name: Create GitHub Release
    needs: [ build-android ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: ./artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./artifacts/**/*.apk
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}
          body: |
            Release: ${{ github.ref_name }}

            APK builds are available as artifacts.

            **Build Info:**
            - Commit: ${{ github.sha }}
            - Author: ${{ github.actor }}
            - Timestamp: ${{ github.event.head_commit.timestamp }}

  notify-build:
    name: Notify Build Status
    needs: [ build-android ]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-android.result }}" = "success" ]; then
            echo "✅ Build succeeded"
            exit 0
          else
            echo "❌ Build failed"
            exit 1
          fi
