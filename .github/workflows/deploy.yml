name: CD - Deploy & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy-release:
    name: Deploy Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: tag_version
        run: |
          VERSION=${GITHUB_REF/refs\/tags\/v/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Release version: ${VERSION}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 30

      - name: Install dependencies
        run: npm ci

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew clean
          ./gradlew assembleRelease \
            -x lintRelease \
            -Porg.gradle.jvmargs=-Xmx4096m

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: ${{ contains(steps.tag_version.outputs.version, 'rc') || contains(steps.tag_version.outputs.version, 'beta') }}
          body: |
            # Release ${{ steps.tag_version.outputs.version }}

            ## Downloads
            - APK: `app-release.apk`

            ## Build Information
            - Commit: ${{ github.sha }}
            - Date: ${{ github.event.head_commit.timestamp }}
            - Author: ${{ github.actor }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-v${{ steps.tag_version.outputs.version }}
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 90

  notify-deployment:
    name: Notify Deployment
    needs: [ deploy-release ]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Get version from tag
        id: tag_version
        run: |
          VERSION=${GITHUB_REF/refs\/tags\/v/}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Create deployment status
        run: |
          if [ "${{ needs.deploy-release.result }}" = "success" ]; then
            echo "✅ Deployment succeeded for v${{ steps.tag_version.outputs.version }}"
          else
            echo "❌ Deployment failed for v${{ steps.tag_version.outputs.version }}"
          fi

      - name: Send notification (if configured)
        if: always()
        run: |
          echo "Deployment status: ${{ needs.deploy-release.result }}"
          echo "Version: ${{ steps.tag_version.outputs.version }}"

  post-release:
    name: Post-Release Tasks
    needs: [ deploy-release ]
    if: success()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate release notes
        run: |
          echo "Release created successfully"
          echo "Tag: ${GITHUB_REF}"
          echo "Commit: ${GITHUB_SHA}"

      - name: Archive release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-archives
          path: |
            android/app/build/outputs/apk/release/
            .github/
          retention-days: 90
